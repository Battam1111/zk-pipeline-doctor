name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]" pytest
      - name: Test
        run: pytest -v
      - name: Self-diagnose
        run: |
          pip install -e .
          zk-doctor . --threshold 5
